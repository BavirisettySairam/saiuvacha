{% extends "account/base.html" %}
{% block head_title %}Sign Out{% endblock %}

{% block content %}
<div class="text-center mb-6">
  <div class="text-5xl mb-3">🙏</div>
  <h2 class="text-xl font-semibold text-gray-800 mb-1">Sign out?</h2>
  <p class="text-sm text-gray-500">Sai Ram — you will be returned to the home page.</p>
</div>

<form method="POST" action="{% url 'account_logout' %}">
  {% csrf_token %}
  <button type="submit"
          class="w-full py-2.5 bg-gray-800 hover:bg-gray-900 text-white text-sm font-medium rounded-xl transition">
    Yes, sign out
  </button>
</form>
<a href="/chat/"
   class="block text-center mt-4 text-sm text-gray-400 hover:text-gray-600 transition">
  Cancel — stay here
</a>
{% endblock %}
