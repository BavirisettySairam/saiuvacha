{% extends "account/base.html" %}
{% block head_title %}Password Changed{% endblock %}

{% block content %}
<div class="text-center">
  <div class="text-6xl mb-4">✅</div>
  <h2 class="text-xl font-semibold text-gray-800 mb-2">Password changed!</h2>
  <p class="text-sm text-gray-500 mb-6 leading-relaxed">
    Your password has been updated successfully. Sai Ram!
  </p>
  <a href="{% url 'account_login' %}"
     class="block w-full py-2.5 text-center bg-saffron-400 hover:bg-saffron-500 text-white text-sm font-medium rounded-xl transition">
    Sign in with new password
  </a>
</div>
{% endblock %}
