<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Sai Uvacha{% endblock %}</title>

  <!-- Tailwind CSS (CDN for dev — replace with build in prod) -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            saffron: { 50:'#fff8f0', 100:'#ffe8c8', 200:'#ffc878', 300:'#ffa030', 400:'#f07800', 500:'#c85a00', DEFAULT:'#f07800' },
            cream:  { DEFAULT:'#fdf6e3', dark:'#f5e6c8' },
          },
          fontFamily: {
            serif: ['"Crimson Text"', 'Georgia', 'serif'],
          },
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">

  <!-- HTMX -->
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>

  {% block extra_head %}{% endblock %}
</head>
<body class="h-full bg-cream font-serif text-gray-800 {% block body_class %}{% endblock %}">

  {% block body %}{% endblock %}

</body>
</html>
