{% if message.role == 'user' %}
<div class="flex justify-end mb-3">
  <div class="max-w-[65%] px-4 py-2.5 bg-amber-50 border border-amber-100 text-gray-800 rounded-3xl rounded-tr-sm text-[14px] leading-relaxed">
    {{ message.content }}
  </div>
</div>
{% else %}
<div class="flex gap-3 mb-6 group">
  <div class="shrink-0 w-8 h-8 rounded-full bg-gradient-to-br from-orange-400 to-amber-500 flex items-center justify-center text-[15px] mt-0.5"
       title="Sai Uvacha">🙏</div>
  <div class="flex-1 min-w-0 pt-0.5">
    <p class="text-[11px] font-medium text-gray-400 mb-2 uppercase tracking-wide">Sai Uvacha</p>
    <div class="md-content assistant-content" data-raw="{{ message.content|escapejs }}">
      {{ message.content }}
    </div>
    <div class="mt-2 flex items-center gap-2">
      {% if message.flagged %}
      <span class="flex items-center gap-1 text-xs text-amber-500">
        <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 24 24"><path d="M4 21V4l7 3 5-3v13l-5 3-7-3z"/></svg>
        Flagged
      </span>
      {% else %}
      <button onclick="flagMessage({{ message.pk }}, this)"
              class="flex items-center gap-1 text-[11px] text-gray-300 hover:text-amber-400 transition opacity-0 group-hover:opacity-100"
              title="Flag this response">
        <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 21v-4m0 0V5a2 2 0 012-2h6.5l1 2H21l-3 6 3 6H9.5l-1-2H5a2 2 0 00-2 2zm9-13.5V9"/>
        </svg>
        Flag
      </button>
      {% endif %}
    </div>
  </div>
</div>
{% endif %}
