{% if message.role == 'user' %}
<div class="flex justify-end">
  <div class="max-w-lg px-4 py-3 bg-saffron-100 text-gray-800 rounded-2xl rounded-tr-sm text-sm leading-relaxed">
    {{ message.content }}
  </div>
</div>
{% else %}
<div class="flex justify-start">
  <div class="max-w-2xl px-5 py-4 bg-white border border-gray-100 shadow-sm text-gray-800 rounded-2xl rounded-tl-sm text-sm leading-relaxed whitespace-pre-wrap">
    {{ message.content }}
    {% if message.flagged %}
    <span class="ml-2 text-xs text-amber-500">⚑ Flagged</span>
    {% else %}
    <button onclick="flagMessage({{ message.pk }}, this)"
            class="ml-2 text-xs text-gray-300 hover:text-amber-400 transition" title="Flag this response">
      ⚑
    </button>
    {% endif %}
  </div>
</div>
{% endif %}
